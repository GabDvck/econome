<!DOCTYPE html>
<html lang="fr">
    <head>
        <title>EconoMe</title>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <link href="style/main.css" rel="stylesheet">
        <link href="style/responsive.css" rel="stylesheet">
        <link href="https://fonts.googleapis.com/css2?family=Poppins&display=swap" rel="stylesheet">
        <link rel="shortcut icon" href="img/512X512.png">
        <link rel="manifest" href="manifest.json">
        <script src="js/libs/chart.umd.min.js" defer></script>
        <script src="js/app.js" type="module"></script>
        <script src="service-worker.js" defer></script>
        <link rel="apple-touch-icon" href="img/512X512.png">
        <meta name="apple-mobile-web-app-status-bar" content="white">
        <meta http-equiv="x-UA-Compatible" content="ie=edge">
        <meta name="theme-color" content="white">
    </head>

    <body>
        <header>
            <div id="titre">
                <img src="img/logo.png" alt="logo EconoMe">
                <h1>EconoMe</h1>
            </div>
            <h2>Mon tableau de bord</h2>
        </header>

        <main>

            <div class="solde-container">
                <div class="solde-info">
                    <span class="solde-titre">SOLDE ACTUEL</span>
                    <h3 id="solde-montant"></h3>
                </div>
                <div class="chart-container">
                    <canvas id="graphique" aria-label="chart" role="img"></canvas>
                </div>
            </div>

            <div class="boutons">
                <button id="ajout">+ Ajouter un revenu</button>
                <button id="suppression">- Ajouter une dépense</button>
            </div>

            <table class="table-transactions">
                <thead>
                    <tr>
                        <th>Date</th>
                        <th>Description</th>
                        <th>Catégorie</th>
                        <th>Montant</th>
                    </tr>
                </thead>
                <tbody id="liste-transactions">
                </tbody>
            </table>

        </main>

        <footer>
            <p>© 2025 Gabriel Devick - EconoMe</p>
            <p><img src="img/logo_github.png" alt="logo github"><a href="https://github.com/GabDvck">Code source sur GitHub</a></p>
            <p><img src="img/mail.png" alt="logo mail">gabriel.devick@gmail.com</p>
        </footer>
    </body>
</html>
